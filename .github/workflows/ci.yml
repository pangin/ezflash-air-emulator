name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-kernel:
    name: Build KO kernel (.bin)
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout air-kernel-ko@korean
        uses: actions/checkout@v4
        with:
          repository: pangin/air-kernel-ko
          ref: korean
          # dir name must match the repo so the Makefile's TARGET (= dir name)
          # produces air-kernel-ko.gba, which link_kernel.py expects.
          path: air-kernel-ko
      - name: Ensure python3
        run: (command -v python3) || (apt-get update && apt-get install -y python3) || (sudo dkp-pacman -Sy --noconfirm python || true)
      - name: Build kernel + link ezairkernel.bin
        working-directory: air-kernel-ko
        run: |
          python3 tools/gen_version.py || true
          make
          python3 tools/link_kernel.py
          ls -la ezairkernel.bin
      - uses: actions/upload-artifact@v4
        with:
          name: ezairkernel-bin
          path: air-kernel-ko/ezairkernel.bin

  test-emulator:
    name: Run harness scenarios
    needs: build-kernel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with mGBA submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build + image tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build pkg-config zlib1g-dev libpng-dev mtools dosfstools python3-pil
      - uses: actions/download-artifact@v4
        with:
          name: ezairkernel-bin
          path: work
      - name: Configure + build harness + cart-core test
        run: |
          cmake -S . -B build/super -G Ninja -DCMAKE_BUILD_TYPE=Debug
          ninja -C build/super ezair-runner ez_cart_test
      - name: Cart-core unit tests (mGBA-free)
        run: ctest --test-dir build/super --output-on-failure
      - name: Make SD image (FAT32, Korean filenames)
        run: bash tools/make_sd_image.sh work/sd.img
      - name: Run scenarios
        run: bash tools/run_tests.sh work/ezairkernel.bin
      - name: Advanced regression (help-freeze fixed + game boot)
        run: bash tools/run_regression.sh work/ezairkernel.bin
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: out/*.png
